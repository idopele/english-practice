<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הלמידה המשפחתית - V26.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --success: #10b981; --error: #ef4444; --bg: #f8fafc; --text: #1e293b; --card-bg: #ffffff; --border: #e2e8f0; }
        [data-theme="dark"] { --bg: #0f172a; --text: #f1f5f9; --card-bg: #1e293b; --border: #475569; }
        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); overflow: hidden; position: relative; align-self: flex-start; min-height: 600px; }
        .screen { padding: 20px; display: none; }
        .active { display: block; }
        .theme-toggle { position: absolute; top: 20px; right: 20px; background: #e2e8f0; border: none; font-size: 18px; cursor: pointer; z-index: 100; padding: 5px 10px; border-radius: 12px; }
        .version-tag { text-align: center; font-size: 12px; opacity: 0.5; padding: 10px; margin-top: auto; }
        .btn { padding: 16px; border-radius: 16px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); text-align: right; }
        .btn-hint { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; margin-top: 5px; padding: 8px; font-size: 14px; }
        .subject-card { color: white; padding: 20px; border-radius: 24px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .card-en { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }
        .card-bible { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .card-science { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .card-report { background: #64748b; }
        .main-word { font-size: 24px; font-weight: 800; margin: 15px 0; text-align: center; min-height: 100px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .score-box { font-size: 16px; font-weight: bold; color: var(--primary); background: #eef2ff; padding: 5px 12px; border-radius: 12px; position: absolute; top: 20px; left: 20px; }
        .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin: 60px 0 10px 0; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        #spellInput { width: 100%; padding: 15px; font-size: 20px; border: 2px solid var(--border); border-radius: 12px; margin-bottom: 10px; text-align: center; background: var(--card-bg); color: var(--text); }
        .speaker-btn { background: #e2e8f0; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-size: 24px; margin-bottom: 10px; }
    </style>
</head>
<body data-theme="light">

<div class="app-container">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</button>

    <div id="subjectScreen" class="screen active">
        <h1 style="font-weight: 800; margin: 30px 0 10px 0;">היי עידו 👋</h1>
        <div class="subject-card card-en" onclick="startApp('english')">
            <div><h2 style="margin:0;">English</h2><small>57 מילים מלאות</small></div><span>🇬🇧</span>
        </div>
        <div class="subject-card card-bible" onclick="startApp('bible')">
            <div><h2 style="margin:0;">תנ"ך</h2><small>יהושע ז'-י'</small></div><span>📜</span>
        </div>
        <div class="subject-card card-science" onclick="showScienceMenu()">
            <div><h2 style="margin:0;">מדעים</h2><small>כל הפרקים</small></div><span>🔬</span>
        </div>
        <div class="subject-card card-report" onclick="showReport()">
            <div><h2 style="margin:0;">דוח הורה</h2><small>צפייה בנתונים</small></div><span>📊</span>
        </div>
        <div class="version-tag">Version 26.0 (Stable)</div>
    </div>

    <div id="scienceMenuScreen" class="screen">
        <button onclick="goHome()" class="btn btn-outline" style="text-align:center; margin-top:30px;">➔ חזרה</button>
        <h3 style="font-weight: 800;">בחרו נושא במדעים:</h3>
        <div class="btn btn-primary" onclick="startApp('sci_traits')">מאפייני חיים (14-21)</div>
        <div class="btn btn-primary" onclick="startApp('sci_needs')">צורכי קיום (22-24)</div>
        <div class="btn btn-primary" onclick="startApp('sci_org')">רמות ארגון (25-34)</div>
        <div class="btn btn-primary" onclick="startApp('sci_cell_structure')">מבנה התא (55-92)</div>
    </div>

    <div id="gameScreen" class="screen">
        <div id="scoreCounter" class="score-box">0/0</div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <div id="targetWord" class="main-word">---</div>
        <div id="optionsArea" style="display: grid; gap: 10px;"></div>
        <div id="spellArea" style="display:none;">
            <input type="text" id="spellInput" placeholder="הקלידו באנגלית..." autocomplete="off">
            <button class="btn btn-primary" onclick="checkSpelling()">בדיקה</button>
            <button id="hintBtn" class="btn btn-hint" onclick="showHint()">רמז 💡</button>
            <div id="hintText" style="text-align:center; margin-top:5px; font-weight:bold; color:var(--primary);"></div>
        </div>
        <button id="nextBtn" class="btn btn-primary" style="display:none; margin-top: 20px;" onclick="nextRound()">המשך ➔</button>
        <div id="feedback" style="text-align:center; margin-top:15px; font-weight:800; font-size: 18px;"></div>
        <button onclick="goHome()" class="btn btn-outline" style="margin-top: 30px; border:none; text-align: center; color: #64748b;">סיום וחזרה 🏠</button>
    </div>

    <div id="reportScreen" class="screen">
        <button onclick="goHome()" class="btn btn-outline" style="text-align:center; margin-top:30px;">➔ חזרה</button>
        <h2 style="font-weight: 800;">מעקב התקדמות</h2>
        <div id="reportList"></div>
    </div>
</div>

<script>
    const content = {
        english: [
            {en:"as well as", he:"וגם / בנוסף"}, {en:"grow", he:"לגדול / לצמוח"}, {en:"however", he:"למרות זאת"},
            {en:"save", he:"לחסוך / להציל"}, {en:"throw away", he:"לזרוק"}, {en:"Earth", he:"כדור הארץ"},
            {en:"happen", he:"לקרות"}, {en:"not too", he:"לא יותר מדי"}, {en:"simple", he:"פשוט"},
            {en:"trash", he:"זבל"}, {en:"enough", he:"מספיק"}, {en:"hill", he:"גבעה"},
            {en:"refrigerator", he:"מקרר"}, {en:"the future", he:"העתיד"}, {en:"waste", he:"בזבוז / לבזבז"},
            {en:"across", he:"מעבר ל-"}, {en:"high", he:"גבוה"}, {en:"photo", he:"תמונה"},
            {en:"suitcase", he:"מזוודה"}, {en:"without", he:"בלי"}, {en:"agree", he:"להסכים"},
            {en:"narrow", he:"צר"}, {en:"slow", he:"איטי"}, {en:"toothbrush", he:"מברשת שיניים"},
            {en:"around", he:"מסביב"}, {en:"part", he:"חלק"}, {en:"stairs", he:"מדרגות"},
            {en:"way", he:"דרך / אופן"}, {en:"especially", he:"במיוחד"}, {en:"exactly", he:"בדיוק"},
            {en:"fairly", he:"למדי / די"}, {en:"immediately", he:"מיד"}, {en:"probably", he:"כנראה"},
            {en:"asleep", he:"ישן"}, {en:"come along", he:"להצטרף"}, {en:"glasses", he:"משקפיים"},
            {en:"hang", he:"לתלות"}, {en:"must", he:"חייב"}, {en:"of course", he:"כמובן"},
            {en:"somebody", he:"מישהו"}, {en:"steal", he:"לגנוב"}, {en:"strange", he:"מוזר"},
            {en:"vacation", he:"חופשה"}, {en:"bright", he:"בוהק"}, {en:"enjoy yourself", he:"תיהנה"},
            {en:"Guess what!", he:"נחשו מה!"}, {en:"lovely", he:"מקסים"}, {en:"suit", he:"חליפה"},
            {en:"cover", he:"לכסות"}, {en:"exciting", he:"מרגש"}, {en:"hole", he:"חור"},
            {en:"office", he:"משרד"}, {en:"war", he:"מלחמה"}, {en:"deep", he:"עמוק"},
            {en:"follow", he:"לעקוב"}, {en:"hope", he:"לקוות"}, {en:"result", he:"תוצאה"}
        ],
        bible: [
            {q:"מה גנב עכן מהחרם?", a:"אדרת שנער, כסף ולשון זהב", dist:["בגדים רגילים","זהב בלבד","נשק"]},
            {q:"מה עשו הגבעונים?", a:"רימו את יהושע שהם באו מרחוק", dist:["נלחמו חזק","ברחו למצרים","התפללו לה'"]},
            {q:"כמה מלכים נלחמו נגד הגבעונים?", a:"חמישה מלכים", dist:["מלך אחד","שלושה מלכים","עשרה מלכים"]},
            {q:"מה קרה בשמש?", a:"שמש בגבעון דום", dist:["היה ליקוי חמה","היה חושך","השמש נעלמה"]}
        ],
        sci_traits: [
            {q:"מהם מאפייני החיים?", a:"נשימה, הזנה, רבייה, הפרשה, גדילה, תגובה לגירויים, תנועה", dist:["רק נשימה ואכילה","בגדים, בית ומים","דיבור ומחשבה"]},
            {q:"מהו חילוף חומרים?", a:"קליטת חומרים, הפקת אנרגיה והפרשת פסולת", dist:["שינה עמוקה","ריצה מהירה","דיבור"]}
        ],
        sci_needs: [
            {q:"מהם צורכי קיום?", a:"חמצן, מים, מזון, טמפרטורה, מרחב מחיה", dist:["טלפון, מחשב, טלוויזיה","בגדים חמים בלבד","שוקולד וסוכריות"]}
        ],
        sci_org: [
            {q:"מה הסדר הנכון מהקטן לגדול?", a:"תא -> רקמה -> איבר -> מערכת -> יצור", dist:["יצור -> תא","איבר -> תא","תא -> מערכת -> איבר"]}
        ],
        sci_cell_structure: [
            {q:"מהו גרעין התא?", a:"מרכז הבקרה המכיל DNA", dist:["מעטפת התא","תחנת כוח","מחסן פסולת"]},
            {q:"איזה אברון יש רק בתא צמח?", a:"כלורופלסט, דופן, חלולית גדולה", dist:["גרעין","מיטוכונדריה","ריבוזום"]}
        ]
    };

    let state = { subject:'', pool:[], idx:0, correct:0 };
    let stats = JSON.parse(localStorage.getItem('stats_v26')) || {
        english: {t:0, c:0}, bible: {t:0, c:0}, sci_traits: {t:0, c:0}, sci_needs: {t:0, c:0}, sci_org: {t:0, c:0}, sci_cell_structure: {t:0, c:0}
    };

    function startApp(s) {
        state.subject = s;
        state.pool = [...content[s]].sort(()=>Math.random()-0.5);
        state.idx = 0; state.correct = 0;
        showScreen('gameScreen'); 
        nextRound();
    }

    function showScienceMenu() { showScreen('scienceMenuScreen'); }

    function nextRound() {
        if(state.idx >= state.pool.length) return end();
        resetUI();
        const item = state.pool[state.idx];
        
        if (state.subject === 'english') {
            document.getElementById('targetWord').innerHTML = `
                <button class="speaker-btn" onclick="speak('${item.en}')">🔊</button>
                <small>תרגמו לאנגלית:</small><br><strong>${item.he}</strong>`;
            document.getElementById('spellArea').style.display = 'block';
        } else {
            document.getElementById('targetWord').innerText = item.q;
            renderOptions(item);
        }
        updateUI();
    }

    function renderOptions(item) {
        const area = document.getElementById('optionsArea');
        area.innerHTML = '';
        area.style.display = 'grid';
        let opts = [item.a, ...item.dist].sort(()=>Math.random()-0.5);
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn btn-outline';
            b.innerText = o;
            b.onclick = () => check(o === item.a);
            area.appendChild(b);
        });
    }

    function check(isCorrect) {
        stats[state.subject].t++;
        if(isCorrect) {
            state.correct++; stats[state.subject].c++;
            confetti({ particleCount: 40, spread: 60, origin: { y: 0.7 } });
            document.getElementById('feedback').innerHTML = "<span style='color:var(--success)'>נכון מאד! ✨</span>";
        } else {
            const correctVal = state.subject === 'english' ? state.pool[state.idx].en : state.pool[state.idx].a;
            document.getElementById('feedback').innerHTML = `<span style='color:var(--error)'>טעות. הנכון הוא: ${correctVal}</span>`;
        }
        localStorage.setItem('stats_v26', JSON.stringify(stats));
        state.idx++;
        document.getElementById('nextBtn').style.display = 'block';
        document.getElementById('optionsArea').style.pointerEvents = 'none';
        document.getElementById('spellArea').style.pointerEvents = 'none';
    }

    function checkSpelling() {
        const val = document.getElementById('spellInput').value.trim().toLowerCase();
        const correct = state.pool[state.idx].en.toLowerCase();
        check(val === correct);
    }

    function showHint() {
        const word = state.pool[state.idx].en;
        document.getElementById('hintText').innerText = `מתחיל ב-${word[0]} ונגמר ב-${word[word.length-1]}`;
    }

    function updateUI() {
        document.getElementById('scoreCounter').innerText = state.idx + " / " + state.pool.length;
        document.getElementById('progressFill').style.width = (state.idx / state.pool.length) * 100 + "%";
    }

    function showReport() {
        const list = document.getElementById('reportList'); list.innerHTML = '';
        const names = { english:'אנגלית', bible:'תנ"ך', sci_traits:'מאפייני חיים', sci_needs:'צורכי קיום', sci_org:'רמות ארגון', sci_cell_structure:'מבנה התא' };
        Object.keys(stats).forEach(key => {
            const p = stats[key].t ? Math.round((stats[key].c/stats[key].t)*100) : 0;
            const div = document.createElement('div'); div.className = 'report-item';
            div.innerHTML = `<div><strong>${names[key]}</strong><br><small>${p}% הצלחה (${stats[key].c}/${stats[key].t})</small></div><button class="reset-btn" onclick="resetStat('${key}')">איפוס</button>`;
            list.appendChild(div);
        });
        showScreen('reportScreen');
    }

    function resetStat(key) { if(confirm(`איפוס?`)) { stats[key]={t:0, c:0}; localStorage.setItem('stats_v26', JSON.stringify(stats)); showReport(); } }

    function resetUI() {
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('feedback').innerText = '';
        document.getElementById('optionsArea').innerHTML = '';
        document.getElementById('optionsArea').style.display = 'none';
        document.getElementById('optionsArea').style.pointerEvents = 'all';
        document.getElementById('spellArea').style.display = 'none';
        document.getElementById('spellArea').style.pointerEvents = 'all';
        document.getElementById('spellInput').value = '';
        document.getElementById('hintText').innerText = '';
    }

    function goHome() { showScreen('subjectScreen'); }
    function end() { alert("כל הכבוד!"); goHome(); }
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function speak(t) { const m = new SpeechSynthesisUtterance(t); m.lang='en-US'; window.speechSynthesis.speak(m); }
    function toggleTheme() {
        const b = document.body;
        const t = b.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        b.setAttribute('data-theme', t);
        document.getElementById('themeIcon').innerText = t === 'light' ? '🌙' : '☀️';
    }
</script>
</body>
</html>
