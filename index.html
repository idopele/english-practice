<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Master Pro - Dark Mode Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* הגדרת משתני צבע למצב יום ולמצב לילה */
        :root { 
            --primary: #6366f1; --success: #10b981; --error: #ef4444; 
            --bg: #f8fafc; --text: #1e293b; --card-bg: #ffffff; 
            --hint: #f59e0b; --input-bg: #ffffff; --border: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg: #0f172a; --text: #f1f5f9; --card-bg: #1e293b; 
            --input-bg: #334155; --border: #475569;
        }

        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; transition: background-color 0.3s, color 0.3s; }
        body { background-color: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }
        .app-container { background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); overflow: hidden; position: relative; }
        
        .screen { padding: 30px; display: none; }
        .active { display: block; }

        /* כפתור החלפת מצב יום/לילה */
        .theme-toggle { position: absolute; top: 20px; left: 20px; background: none; border: none; font-size: 24px; cursor: pointer; z-index: 10; }

        .btn { padding: 16px; border-radius: 16px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; width: 100%; display: block; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); }
        
        .btn-danger {
            background: #fee2e2; color: #ef4444; border: 1px solid #fecaca;
            margin-top: 20px; font-size: 14px; padding: 12px; border-radius: 12px;
            font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%;
        }
        .btn-danger:hover { background: #ef4444; color: white; }

        .hero-title { font-size: 30px; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        .category-list { display: grid; gap: 10px; margin-top: 20px; }
        .cat-btn { background: var(--input-bg); border: 2px solid transparent; padding: 18px; border-radius: 20px; cursor: pointer; text-align: right; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; width: 100%; color: var(--text); }
        .cat-btn:hover { border-color: var(--primary); background: #eef2ff; }
        [data-theme="dark"] .cat-btn:hover { background: #334155; border-color: var(--primary); }

        .dash-card { background: var(--input-bg); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .stat-box { background: var(--card-bg); padding: 10px; border-radius: 12px; text-align: center; }
        .stat-val { font-size: 20px; font-weight: 800; color: var(--primary); display: block; }
        .bad-word { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid var(--border); font-size: 14px; }

        .top-nav { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; }
        .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        #progressFill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        .main-word { font-size: 42px; font-weight: 800; margin: 20px 0; text-align: center; }
        
        input#spellInput { width: 100%; padding: 18px; font-size: 22px; border: 3px solid var(--border); border-radius: 15px; text-align: center; margin-bottom: 15px; outline: none; background: var(--input-bg); color: var(--text); }
        input#spellInput:focus { border-color: var(--primary); }
        
        .spell-controls { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-small { padding: 12px; border-radius: 12px; flex: 1; font-size: 14px; }
        .btn-audio { background: #eef2ff; color: var(--primary); border: 1px solid #e0e7ff; }
        .btn-hint { background: #fffbeb; color: var(--hint); border: 1px solid #fef3c7; }

        .footer-parent { margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border); text-align: center; }
        .parent-link { color: #94a3b8; font-size: 16px; cursor: pointer; }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100% {transform: translateX(0);} 25% {transform:translateX(-8px);} 75% {transform:translateX(8px);} }
    </style>
</head>
<body data-theme="light">

<div class="app-container">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</button>

    <div id="setupScreen" class="screen active">
        <h1 class="hero-title">English Prep 📝</h1>
        <p>Choose a topic to start:</p>
        <div class="category-list" id="catList"></div>
        <div class="footer-parent">
            <span class="parent-link" onclick="showDashboard()">🔒 Parent Dashboard</span>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div class="top-nav">
            <div id="lives">❤️❤️❤️</div>
            <div id="streakDisplay">🔥 0</div>
        </div>
        <div class="progress-bar"><div id="progressFill"></div></div>
        <div style="text-align: center;">
            <div id="qLabel" style="color:#94a3b8; font-size:12px; font-weight:bold;">TRANSLATE</div>
            <div id="targetWord" class="main-word">---</div>
            <div id="hintDisplay" style="color:var(--hint); font-weight:bold; margin-bottom:10px; display:none;"></div>
        </div>
        
        <div id="optionsArea" class="options-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
        
        <div id="spellArea" style="display:none;">
            <input type="text" id="spellInput" placeholder="Type in English..." autocomplete="off">
            <div class="spell-controls">
                <button class="btn btn-small btn-audio" onclick="speakCurrent()">🔊 שמע</button>
                <button class="btn btn-small btn-hint" onclick="showHint()">💡 רמז</button>
            </div>
            <button class="btn btn-primary" onclick="checkSpelling()">Check Answer</button>
        </div>

        <button id="nextBtn" class="btn btn-primary" style="display:none; margin-top:20px;" onclick="nextRound()">Continue ➔</button>
        <div id="feedback" style="text-align:center; margin-top:20px; font-weight:800; font-size:20px;"></div>
    </div>

    <div id="parentScreen" class="screen">
        <h2 class="hero-title">Parent Control 📊</h2>
        <div class="dash-card">
            <div class="stat-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="stat-box"><span class="stat-val" id="totalSessions">0</span><span class="stat-label">סבבים</span></div>
                <div class="stat-box"><span class="stat-val" id="avgAccuracy">0%</span><span class="stat-label">דיוק</span></div>
            </div>
        </div>
        <h3 style="font-size:16px;">⚠️ מילים מאתגרות:</h3>
        <div class="dash-card word-list-scroll" id="struggleList"></div>
        <button class="btn btn-outline" onclick="location.reload()">Back Home</button>
        <button class="btn-danger" onclick="resetStats()">Reset All Data ⚠️</button>
    </div>
</div>

<script>
    // --- ניהול DARK MODE ---
    function toggleTheme() {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', next);
        document.getElementById('themeIcon').innerText = next === 'light' ? '🌙' : '☀️';
        localStorage.setItem('theme', next);
    }

    // טעינת הגדרת המשתמש השמורה
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.body.setAttribute('data-theme', savedTheme);
    document.getElementById('themeIcon').innerText = savedTheme === 'light' ? '🌙' : '☀️';

    // --- לוגיקת משחק ---
    const vocabulary = [
        { en: "as well as", he: "וגם / בנוסף", cat: "Home" }, { en: "grow", he: "לגדול / לצמוח", cat: "Animals" },
        { en: "however", he: "למרות זאת", cat: "General" }, { en: "save", he: "לחסוך / להציל", cat: "Animals" },
        { en: "throw away", he: "לזרוק", cat: "Home" }, { en: "Earth", he: "כדור הארץ", cat: "Animals" },
        { en: "happen", he: "לקרות", cat: "General" }, { en: "simple", he: "פשוט", cat: "General" },
        { en: "trash", he: "זבל", cat: "Home" }, { en: "refrigerator", he: "מקרר", cat: "Home" },
        { en: "especially", he: "במיוחד", cat: "Adverbs" }, { en: "exactly", he: "בדיוק", cat: "Adverbs" },
        { en: "immediately", he: "מיד", cat: "Adverbs" }, { en: "probably", he: "כנראה", cat: "Adverbs" },
        { en: "suitcase", he: "מזוודה", cat: "Home" }, { en: "vacation", he: "חופשה", cat: "Home" }
    ];

    let state = {
        pool: [], current: 0, lives: 3, 
        sessionCorrect: 0, sessionTotal: 0,
        stats: JSON.parse(localStorage.getItem('eng_pro_stats')) || { sessions: 0, words: {} }
    };

    function initCategories() {
        const cats = ['All', ...new Set(vocabulary.map(v => v.cat))];
        const container = document.getElementById('catList');
        container.innerHTML = "";
        cats.forEach(c => {
            container.innerHTML += `<button class="cat-btn" onclick="startGame('${c}')"><b>${c} Practice</b> <span>➔</span></button>`;
        });
    }

    function startGame(cat) {
        state.pool = cat === 'All' ? [...vocabulary] : vocabulary.filter(v => v.cat === cat);
        state.pool.sort(() => Math.random() - 0.5);
        state.current = 0; state.lives = 3; state.sessionCorrect = 0; state.sessionTotal = 0;
        showScreen('gameScreen');
        nextRound();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function nextRound() {
        if (state.lives <= 0 || state.current >= state.pool.length) return endSession();
        const word = state.pool[state.current];
        const isSpell = Math.random() > 0.5;
        resetRoundUI();
        document.getElementById('targetWord').innerText = isSpell ? word.he : word.en;
        document.getElementById('qLabel').innerText = isSpell ? "HOW DO YOU SPELL?" : "CHOOSE TRANSLATION";
        if (isSpell) {
            document.getElementById('optionsArea').style.display = 'none';
            document.getElementById('spellArea').style.display = 'block';
            document.getElementById('spellInput').focus();
        } else {
            document.getElementById('optionsArea').style.display = 'grid';
            document.getElementById('spellArea').style.display = 'none';
            renderOptions(word);
        }
        speakCurrent();
    }

    function renderOptions(correct) {
        let opts = [correct.he];
        while(opts.length < 4) {
            let r = vocabulary[Math.floor(Math.random()*vocabulary.length)].he;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5).forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn btn-outline'; b.innerText = o;
            b.onclick = () => handleAnswer(o === correct.he);
            document.getElementById('optionsArea').appendChild(b);
        });
    }

    function handleAnswer(correct) {
        const word = state.pool[state.current];
        if(!state.stats.words[word.en]) state.stats.words[word.en] = { correct: 0, wrong: 0, cat: word.cat };
        if(correct) {
            state.sessionCorrect++; state.stats.words[word.en].correct++;
            confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });
            document.getElementById('feedback').innerText = "Excellent! ✨";
            document.getElementById('feedback').style.color = "var(--success)";
        } else {
            state.lives--; state.stats.words[word.en].wrong++;
            document.getElementById('gameScreen').classList.add('shake');
            document.getElementById('feedback').innerText = "Correct: " + word.en;
            document.getElementById('feedback').style.color = "var(--error)";
        }
        state.sessionTotal++; state.current++;
        save();
        document.getElementById('optionsArea').style.display = 'none';
        document.getElementById('spellArea').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'block';
        updateUI();
    }

    function checkSpelling() {
        const input = document.getElementById('spellInput').value.trim().toLowerCase();
        handleAnswer(input === state.pool[state.current].en.toLowerCase());
    }

    function speakCurrent() {
        window.speechSynthesis.cancel();
        const txt = state.pool[state.current].en;
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'en-US'; u.rate = 0.7; window.speechSynthesis.speak(u);
    }

    function showHint() {
        const word = state.pool[state.current].en;
        document.getElementById('hintDisplay').innerText = "מתחיל ב: " + word.substring(0, 2) + "...";
        document.getElementById('hintDisplay').style.display = 'block';
    }

    function showDashboard() {
        showScreen('parentScreen');
        const s = state.stats;
        document.getElementById('totalSessions').innerText = s.sessions;
        let totalC = 0, totalW = 0, struggleHTML = "";
        Object.keys(s.words).forEach(w => {
            const data = s.words[w];
            totalC += data.correct; totalW += data.wrong;
            if(data.wrong > 0) struggleHTML += `<div class="bad-word"><span>${w}</span> <b style="color:var(--error)">${data.wrong} טעויות</b></div>`;
        });
        const acc = (totalC + totalW) > 0 ? Math.round((totalC / (totalC + totalW)) * 100) : 0;
        document.getElementById('avgAccuracy').innerText = acc + "%";
        document.getElementById('struggleList').
