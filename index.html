<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הלמידה המשפחתית V22.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --success: #10b981; --error: #ef4444; --bg: #f8fafc; --text: #1e293b; --card-bg: #ffffff; --border: #e2e8f0; }
        [data-theme="dark"] { --bg: #0f172a; --text: #f1f5f9; --card-bg: #1e293b; --border: #475569; }
        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); overflow: hidden; position: relative; align-self: flex-start; }
        .screen { padding: 20px; display: none; }
        .active { display: block; }
        .theme-toggle { position: absolute; top: 15px; left: 15px; background: none; border: none; font-size: 20px; cursor: pointer; z-index: 10; }
        .btn { padding: 16px; border-radius: 16px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); text-align: right; }
        .subject-card { color: white; padding: 20px; border-radius: 24px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .card-en { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }
        .card-bible { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .card-science { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .card-report { background: #64748b; }
        .main-word { font-size: 22px; font-weight: 800; margin: 15px 0; text-align: center; min-height: 120px; display: flex; align-items: center; justify-content: center; flex-direction: column; line-height: 1.3; }
        .score-box { font-size: 18px; font-weight: bold; color: var(--primary); background: #eef2ff; padding: 5px 15px; border-radius: 20px; }
        .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        .report-item { background: var(--bg); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .reset-btn { background: var(--error); color: white; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        #spellInput { width: 100%; padding: 15px; font-size: 20px; border: 2px solid var(--border); border-radius: 12px; margin-bottom: 10px; text-align: center; background: var(--card-bg); color: var(--text); }
        .speaker-btn { background: #e2e8f0; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; margin-top: 10px; font-size: 20px; }
    </style>
</head>
<body data-theme="light">

<div class="app-container">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</button>

    <div id="subjectScreen" class="screen active">
        <h1 style="font-weight: 800; margin-bottom: 5px;">היי עידו! 👋</h1>
        <div class="subject-card card-en" onclick="startApp('english', 'עמנואלי')">
            <div><h2 style="margin:0;">English</h2><small>57 מילים - עמנואלי</small></div><span>🇬🇧</span>
        </div>
        <div class="subject-card card-bible" onclick="startApp('bible', 'עמנואלי')">
            <div><h2 style="margin:0;">תנ"ך</h2><small>יהושע ז'-י' - עמנואלי</small></div><span>📜</span>
        </div>
        <div class="subject-card card-science" onclick="showScienceMenu()">
            <div><h2 style="margin:0;">מדעים</h2><small>3 שאלונים - דוני</small></div><span>🔬</span>
        </div>
        <div class="subject-card card-report" onclick="showReport()">
            <div><h2 style="margin:0;">דוח הורה</h2><small>צפייה באירוס וביצועים</small></div><span>📊</span>
        </div>
    </div>

    <div id="scienceMenuScreen" class="screen">
        <button onclick="goHome()" class="btn btn-outline" style="text-align:center;">➔ חזרה</button>
        <h2 style="font-weight: 800;">בחר נושא במדעים:</h2>
        <div class="btn btn-primary" onclick="startApp('sci_life', 'דוני')">מאפייני חיים וצורכי קיום (14-24)</div>
        <div class="btn btn-primary" onclick="startApp('sci_org', 'דוני')">רמות ארגון בטבע (25-34)</div>
        <div class="btn btn-primary" onclick="startApp('sci_cell', 'דוני')">התא: מבנה ותהליכים (55-92)</div>
    </div>

    <div id="gameScreen" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button onclick="goHome()" style="background:none; border:none; cursor:pointer; font-size: 24px;">🏠</button>
            <div id="scoreCounter" class="score-box">0/0</div>
        </div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <div id="targetWord" class="main-word">---</div>
        <div id="optionsArea" style="display: grid; gap: 10px;"></div>
        <div id="spellArea" style="display:none;">
            <input type="text" id="spellInput" placeholder="הקלד באנגלית..." autocomplete="off">
            <button class="btn btn-primary" onclick="checkSpelling()">בדיקה</button>
        </div>
        <button id="nextBtn" class="btn btn-primary" style="display:none;" onclick="nextRound()">המשך ➔</button>
        <div id="feedback" style="text-align:center; margin-top:15px; font-weight:800; font-size: 18px;"></div>
    </div>

    <div id="reportScreen" class="screen">
        <button onclick="goHome()" class="btn btn-outline" style="text-align:center;">➔ חזרה</button>
        <h2 style="font-weight: 800;">מצב התקדמות הילדים</h2>
        <div id="reportList"></div>
    </div>
</div>

<script>
    const content = {
        english: [
            {q:"as well as", a:"וגם / בנוסף", type:"multiple", en:"as well as"}, {q:"grow", a:"לגדול / לצמוח", type:"spell", en:"grow"},
            {q:"however", a:"למרות זאת", type:"multiple", en:"however"}, {q:"save", a:"לחסוך / להציל", type:"spell", en:"save"},
            {q:"throw away", a:"לזרוק", type:"spell", en:"throw away"}, {q:"Earth", a:"כדור הארץ", type:"spell", en:"Earth"},
            {q:"happen", a:"לקרות", type:"multiple", en:"happen"}, {q:"not too", a:"לא יותר מדי", type:"multiple", en:"not too"},
            {q:"simple", a:"פשוט", type:"spell", en:"simple"}, {q:"trash", a:"זבל", type:"multiple", en:"trash"},
            {q:"enough", a:"מספיק", type:"spell", en:"enough"}, {q:"hill", a:"גבעה", type:"multiple", en:"hill"},
            {q:"refrigerator", a:"מקרר", type:"spell", en:"refrigerator"}, {q:"the future", a:"העתיד", type:"multiple", en:"the future"},
            {q:"waste", a:"בזבוז / לבזבז", type:"spell", en:"waste"}, {q:"across", a:"מעבר ל-", type:"multiple", en:"across"},
            {q:"high", a:"גבוה", type:"spell", en:"high"}, {q:"photo", a:"תמונה", type:"spell", en:"photo"},
            {q:"suitcase", a:"מזוודה", type:"spell", en:"suitcase"}, {q:"without", a:"בלי", type:"multiple", en:"without"},
            {q:"agree", a:"להסכים", type:"multiple", en:"agree"}, {q:"narrow", a:"צר", type:"spell", en:"narrow"},
            {q:"slow", a:"איטי", type:"spell", en:"slow"}, {q:"toothbrush", a:"מברשת שיניים", type:"spell", en:"toothbrush"},
            {q:"around", a:"מסביב", type:"multiple", en:"around"}, {q:"part", a:"חלק", type:"multiple", en:"part"},
            {q:"stairs", a:"מדרגות", type:"spell", en:"stairs"}, {q:"way", a:"דרך / אופן", type:"multiple", en:"way"},
            {q:"especially", a:"במיוחד", type:"multiple", en:"especially"}, {q:"exactly", a:"בדיוק", type:"spell", en:"exactly"},
            {q:"fairly", a:"למדי / די", type:"multiple", en:"fairly"}, {q:"immediately", a:"מיד", type:"spell", en:"immediately"},
            {q:"probably", a:"כנראה", type:"multiple", en:"probably"}, {q:"asleep", a:"ישן", type:"multiple", en:"asleep"},
            {q:"come along", a:"להצטרף", type:"multiple", en:"come along"}, {q:"glasses", a:"משקפיים", type:"spell", en:"glasses"},
            {q:"hang", a:"לתלות", type:"multiple", en:"hang"}, {q:"must", a:"חייב", type:"multiple", en:"must"},
            {q:"of course", a:"כמובן", type:"multiple", en:"of course"}, {q:"somebody", a:"מישהו", type:"multiple", en:"somebody"},
            {q:"steal", a:"לגנוב", type:"spell", en:"steal"}, {q:"strange", a:"מוזר", type:"spell", en:"strange"},
            {q:"vacation", a:"חופשה", type:"multiple", en:"vacation"}, {q:"bright", a:"בוהק", type:"spell", en:"bright"},
            {q:"enjoy yourself", a:"תיהנה", type:"multiple", en:"enjoy yourself"}, {q:"Guess what!", a:"נחשו מה!", type:"multiple", en:"Guess what"},
            {q:"lovely", a:"מקסים", type:"multiple", en:"lovely"}, {q:"suit", a:"חליפה", type:"spell", en:"suit"},
            {q:"cover", a:"לכסות", type:"multiple", en:"cover"}, {q:"exciting", a:"מרגש", type:"multiple", en:"exciting"},
            {q:"hole", a:"חור", type:"spell", en:"hole"}, {q:"office", a:"משרד", type:"spell", en:"office"},
            {q:"war", a:"מלחמה", type:"multiple", en:"war"}, {q:"deep", a:"עמוק", type:"spell", en:"deep"},
            {q:"follow", a:"לעקוב", type:"spell", en:"follow"}, {q:"hope", a:"לקוות", type:"multiple", en:"hope"},
            {q:"result", a:"תוצאה", type:"spell", en:"result"}
        ],
        bible: [
            {q:"מה המקור המדויק לחטא עכן?", a:"אדרת שנער, 200 שקלים כסף ולשון זהב", dist:["בגדים יפים בלבד","זהב וכסף בלבד","נשק שלל"]},
            {q:"כמה אנשים מתו בקרב הראשון מול העי?", a:"כ-36 איש", dist:["100 איש","איש לא מת","3000 איש"]},
            {q:"מי אמר למי: 'חטא ישראל וגם עברו את בריתי'?", a:"ה' ליהושע", dist:["יהושע לעכן","העם ליהושע","ה' לעכן"]},
            {q:"כיצד נתפס עכן בחטאו?", a:"על ידי הפלת גורל", dist:["יהושע ראה אותו","המרגלים דיווחו","אשתו סיפרה"]},
            {q:"היכן נערך טקס קריאת התורה והברכות?", a:"בין הר גריזים והר עיבל", dist:["ביריחו","בירושלים","בגלגל"]},
            {q:"מה עשו הגבעונים כדי לרמות את ישראל?", a:"התחפשו לאנשים שבאו מרחוק עם לחם יבש ונעליים קרועות", dist:["נלחמו בלילה","שלחו מרגלים","הביאו זהב"]},
            {q:"מה היה גזר הדין של הגבעונים?", a:"חוטבי עצים ושואבי מים לעדה", dist:["גירוש","מוות","תשלום מס"]},
            {q:"באיזה עמק עמדה השמש מלכת?", a:"עמק אילון", dist:["עמק יזרעאל","עמק האלה","עמק דותן"]},
            {q:"כמה מלכים נלחמו נגד הגבעונים בברית?", a:"חמישה מלכים", dist:["שלושה מלכים","עשרה מלכים","מלך אחד"]},
            {q:"מה קרה למלכים שברחו למערה במקדה?", a:"יהושע כלא אותם באבנים גדולות ואז הרג אותם", dist:["הם ברחו","הוא סלח להם","הם מתו מרעב"]},
            {q:"מי עזר ליהושע בקרב נגד חמשת המלכים בעזרת אבנים גדולות מהשמים?", a:"ה'", dist:["המרגלים","הגבעונים","החיילים"]},
            {q:"מדוע יהושע לא הרג את הגבעונים לאחר שגילה את התרמית?", a:"בגלל השבועה שנשבעו להם נשיאי העדה", dist:["כי הוא פחד מהם","כי הם היו חזקים","כי ה' אמר לו לסלוח"]}
        ],
        sci_life: [
            {q:"מהם 7 מאפייני החיים שחייבים להתקיים בכל יצור?", a:"נשימה, הזנה, רבייה, הפרשה, גדילה, תגובה לגירויים, תנועה", dist:["תעופה, שינה, אכילה","דיבור, נשימה, גדילה","מים, מזון, חמצן"]},
            {q:"האם יצור חי יכול להתקיים ללא רבייה?", a:"היצור עצמו כן, אך המין שלו ייכחד", dist:["לא, הוא ימות מיד","כן, רבייה היא לא מאפיין חיים","רק אם הוא חד-תאי"]},
            {q:"מהו צורך קיום חיוני שאינו מאפיין חיים?", a:"מים", dist:["רבייה","הפרשה","תנועה"]},
            {q:"מהי חשיבות התגובה לגירויים?", a:"הישרדות בסביבה משתנה", dist:["ייצור מזון","יכולת לגדול","הפרשת פסולת"]},
            {q:"איזה צורך קיום דרוש לצמחים כדי לייצר מזון?", a:"אור שמש", dist:["בגדים","חמצן","בית"]},
            {q:"מהו הומאוסטזיס?", a:"שמירה על סביבה פנימית יציבה למרות שינויים בחוץ", dist:["יכולת התנועה של התא","תהליך הרבייה","גדילת היצור"]},
            {q:"איזה גז דרוש לרוב היצורים לתהליך הנשימה?", a:"חמצן", dist:["פחמן דו-חמצני","מימן","חנקן"]},
            {q:"מהי הזנה הטרוטרופית?", a:"אכילת יצורים אחרים (כמו בעלי חיים)", dist:["ייצור עצמי של מזון","נשימה דרך העור","שתיית מים בלבד"]}
        ],
        sci_org: [
            {q:"סדר את רמות הארגון מהקטן לגדול:", a:"תא -> רקמה -> איבר -> מערכת -> יצור", dist:["רקמה -> תא -> איבר","תא -> איבר -> רקמה","מולקולה -> תא -> אברון"]},
            {q:"מהי הגדרת הרקמה?", a:"קבוצת תאים בעלי מבנה דומה ותפקיד משותף", dist:["נוזל התא","מעטפת האיברים","סוג של אברון"]},
            {q:"איזו רמה כוללת מספר איברים הפועלים יחד?", a:"מערכת", dist:["רקמה","תא","אטום"]},
            {q:"מהי רמת הארגון הכוללת את כל היצורים מאותו מין באזור מסוים?", a:"אוכלוסייה", dist:["קהילה","מערכת אקולוגית","רקמה"]},
            {q:"מהי קהילה בטבע?", a:"מספר אוכלוסיות של מינים שונים החיים יחד", dist:["קבוצת תאים","מערכת של איברים","יצור חי אחד"]},
            {q:"איזה איבר שייך למערכת ההובלה?", a:"לב", dist:["קיבה","ריאות","מוח"]},
            {q:"מהי היחידה הבסיסית של כל היצורים החיים?", a:"התא", dist:["האטום","הרקמה","האיבר"]}
        ],
        sci_cell: [
            {q:"איזה אברון אחראי על הפקת אנרגיה (נשימה תאית)?", a:"מיטוכונדריה", dist:["ריבוזום","גרעין","כלורופלסט"]},
            {q:"מה תפקיד הכלורופלסט בתא צמח?", a:"פוטוסינתזה (ייצור סוכר מאור)", dist:["הגנה","נשימה","אחסון מים"]},
            {q:"מה תפקיד קרום התא?", a:"בררנות - פיקוח על חומרים נכנסים ויוצאים", dist:["יציבות קשיחה","ייצור חלבונים","שכפול DNA"]},
            {q:"מה ההבדל העיקרי בין דופן לתא לקרום?", a:"הדופן קשיחה ומגינה, הקרום גמיש ובררני", dist:["הקרום רק בצמחים","הדופן רק בבעלי חיים","אין הבדל"]},
            {q:"מהי החלולית?", a:"מאגר מים ומומסים הנותן יציבות לתא הצמח", dist:["מרכז הבקרה","תחנת כוח","מפעל חלבונים"]},
            {q:"מה תפקיד הריבוזומים?", a:"בניית חלבונים", dist:["ייצור סוכר","הפקת אנרגיה","שמירה על DNA"]},
            {q:"מדוע תאים חייבים להיות קטנים?", a:"כדי ששטח הפנים יהיה גדול מספיק ביחס לנפח למעבר חומרים מהיר", dist:["כדי שנוכל לראותם במיקרוסקופ","כדי שלא יתפוצצו","כי אין מקום בגוף"]},
            {q:"מה יקרה לתא דם אדום שיוכנס למים מזוקקים (ריכוז מלח 0)?", a:"הוא יתנפח ויתפוצץ מאוסמוזה", dist:["הוא יתכווץ","לא יקרה כלום","הוא יתחיל לצמוח"]},
            {q:"מהי דיפוזיה?", a:"מעבר חומר מריכוז גבוה לנמוך ללא השקעת אנרגיה", dist:["מעבר מים בלבד","ייצור אנרגיה","תנועת תאים"]},
            {q:"איזה אברון מכיל את החומר התורשתי?", a:"גרעין התא", dist:["ציטופלזמה","חלולית","דופן"]}
        ]
    };

    let state = { subject:'', pool:[], idx:0, correct:0, user:'' };
    let stats = JSON.parse(localStorage.getItem('family_stats_v2')) || {
        english: {total:0, correct:0}, bible: {total:0, correct:0},
        sci_life: {total:0, correct:0}, sci_org: {total:0, correct:0}, sci_cell: {total:0, correct:0}
    };

    function startApp(s, user) {
        state.subject = s; state.user = user;
        state.pool = [...content[s]].sort(()=>Math.random()-0.5);
        state.idx = 0; state.correct = 0;
        showScreen('gameScreen'); nextRound();
    }

    function showScienceMenu() { showScreen('scienceMenuScreen'); }

    function nextRound() {
        if(state.idx >= state.pool.length) return end();
        resetUI();
        const item = state.pool[state.idx];
        if (state.subject === 'english' && item.type === 'spell') {
            document.getElementById('targetWord').innerHTML = `<span style="font-size:14px; color:gray;">תרגמו לאנגלית:</span><br>${item.a}<br><button class="speaker-btn" onclick="speak('${item.en}')">🔊</button>`;
            document.getElementById('spellArea').style.display = 'block';
            document.getElementById('optionsArea').style.display = 'none';
        } else {
            document.getElementById('targetWord').innerText = item.q || item.a;
            renderOptions(item);
        }
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US'; window.speechSynthesis.speak(msg);
    }

    function renderOptions(item) {
        const area = document.getElementById('optionsArea');
        area.style.display = 'grid';
        let opts = [item.a, ...item.dist].sort(()=>Math.random()-0.5);
        opts.forEach(o => {
            const b = document.createElement('button'); 
            b.className = 'btn btn-outline';
            b.innerText = o; 
            b.onclick = () => check(o === item.a);
            area.appendChild(b);
        });
    }

    function check(isCorrect) {
        stats[state.subject].total++;
        if(isCorrect) {
            state.correct++; stats[state.subject].correct++;
            confetti({ particleCount: 50, spread: 70 });
            document.getElementById('feedback').innerText = "מעולה! ✨";
        } else {
            document.getElementById('feedback').innerText = "לא נורא, התשובה: " + state.pool[state.idx].a;
        }
        localStorage.setItem('family_stats_v2', JSON.stringify(stats));
        state.idx++;
        document.getElementById('nextBtn').style.display = 'block';
        document.getElementById('optionsArea').style.pointerEvents = 'none';
        updateUI();
    }

    function checkSpelling() {
        const val = document.getElementById('spellInput').value.trim().toLowerCase();
        check(val === state.pool[state.idx].en.toLowerCase());
        document.getElementById('spellArea').style.display = 'none';
    }

    function showReport() {
        const list = document.getElementById('reportList');
        list.innerHTML = '';
        const names = {english:'אנגלית', bible:'תנ"ך', sci_life:'מדעים: מאפייני חיים', sci_org:'מדעים: רמות ארגון', sci_cell:'מדעים: התא'};
        Object.keys(stats).forEach(key => {
            const perc = stats[key].total ? Math.round((stats[key].correct/stats[key].total)*100) : 0;
            const div = document.createElement('div');
            div.className = 'report-item';
            div.innerHTML = `<div><strong>${names[key]}</strong><br><small>הצלחה: ${perc}% (${stats[key].correct}/${stats[key].total})</small></div><button class="reset-btn" onclick="resetStat('${key}')">איפוס</button>`;
            list.appendChild(div);
        });
        showScreen('reportScreen');
    }

    function resetStat(key) {
        if(confirm(`לאפס נתוני ${key}?`)) {
            stats[key] = {total:0, correct:0};
            localStorage.setItem('family_stats_v2', JSON.stringify(stats));
            showReport();
        }
    }

    function updateUI() {
        document.getElementById('scoreCounter').innerText = state.correct + "/" + state.idx;
        document.getElementById('progressFill').style.width = (state.idx/state.pool.length)*100 + "%";
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function resetUI() {
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('feedback').innerText = '';
        document.getElementById('optionsArea').innerHTML = '';
        document.getElementById('optionsArea').style.pointerEvents = 'all';
        document.getElementById('spellArea').style.display = 'none';
        document.getElementById('spellInput').value = '';
    }

    function goHome() { showScreen('subjectScreen'); }
    function end() { alert("כל הכבוד! סיימת את הפרק."); goHome(); }
    function toggleTheme() {
        const t = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', t);
    }
</script>
</body>
</html>
