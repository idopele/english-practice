<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Master Pro 7.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --primary-hover: #4f46e5;
            --success: #10b981; --error: #ef4444;
            --bg: #f8fafc; --text: #1e293b;
            --card-bg: #ffffff; --hint: #f59e0b;
        }
        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }

        /* קונטיינר ראשי */
        .app-container { background: var(--card-bg); width: 100%; max-width: 480px; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); overflow: hidden; position: relative; transition: 0.3s; }
        
        /* מסך פתיחה - קטגוריות */
        #setupScreen { padding: 40px 30px; display: block; }
        .hero-title { font-size: 32px; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
        .hero-subtitle { color: #64748b; margin-bottom: 30px; }
        .category-list { display: grid; gap: 12px; }
        .cat-btn { background: #f1f5f9; border: 2px solid transparent; padding: 20px; border-radius: 20px; cursor: pointer; text-align: right; transition: 0.2s; display: flex; align-items: center; justify-content: space-between; }
        .cat-btn:hover { border-color: var(--primary); background: #eef2ff; }
        .cat-btn b { font-size: 18px; }

        /* מסך משחק */
        #gameScreen { padding: 30px; display: none; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .streak-badge { background: #fff7ed; color: #c2410c; padding: 6px 12px; border-radius: 12px; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        
        .progress-wrapper { background: #f1f5f9; height: 10px; border-radius: 5px; margin-bottom: 30px; overflow: hidden; }
        #progressBar { height: 100%; background: linear-gradient(90deg, #6366f1, #a855f7); width: 0%; transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .question-box { text-align: center; margin-bottom: 30px; min-height: 180px; display: flex; flex-direction: column; justify-content: center; }
        .q-label { font-size: 13px; font-weight: bold; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .main-word { font-size: 48px; font-weight: 800; color: var(--text); margin: 0; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { background: white; border: 2px solid #e2e8f0; padding: 20px; border-radius: 18px; cursor: pointer; font-size: 18px; font-weight: 600; transition: 0.2s; }
        .opt-btn:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-3px); }

        #spellInput { width: 100%; padding: 20px; font-size: 24px; border: 3px solid #e2e8f0; border-radius: 18px; text-align: center; outline: none; margin-bottom: 20px; }
        #spellInput:focus { border-color: var(--primary); }

        .controls { display: flex; gap: 10px; }
        .btn { padding: 18px; border-radius: 18px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-check { background: var(--primary); color: white; flex: 2; }
        .btn-hint { background: #fffbeb; color: var(--hint); flex: 1; border: 2px solid #fef3c7; }
        .btn-audio { background: #f8fafc; border: 2px solid #e2e8f0; width: 60px; font-size: 20px; }

        .feedback-area { position: absolute; bottom: 30px; left: 0; right: 0; text-align: center; font-size: 24px; font-weight: 800; pointer-events: none; }
        
        /* דוח הורים */
        #reportScreen { padding: 30px; display: none; text-align: center; }
        .report-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }

        .footer { margin-top: 20px; text-align: center; }
        .reset-link { color: #94a3b8; font-size: 12px; cursor: pointer; text-decoration: underline; }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
    </style>
</head>
<body>

<div class="app-container">
    <div id="setupScreen">
        <h1 class="hero-title">Hey there! 👋</h1>
        <p class="hero-subtitle">Ready to master English? Choose a topic:</p>
        <div class="category-list">
            <button class="cat-btn" onclick="startGame('all')"><b>Mixed Practice 🚀</b> <span>כל המילים</span></button>
            <button class="cat-btn" onclick="startGame('adverbs')"><b>Smart Adverbs 💡</b> <span>תוארי הפועל</span></button>
            <button class="cat-btn" onclick="startGame('animals')"><b>Animal Rescue 🐾</b> <span>חיות וטבע</span></button>
            <button class="cat-btn" onclick="startGame('home')"><b>Home & Life 🏠</b> <span>בית ויומיום</span></button>
        </div>
        <div class="footer">
            <span class="reset-link" onclick="resetAll()">Reset History 🔄</span>
        </div>
    </div>

    <div id="gameScreen">
        <div class="top-nav">
            <div class="streak-badge">🔥 <span id="streakVal">0</span> Day Streak</div>
            <div id="lives">❤️❤️❤️</div>
        </div>
        
        <div class="progress-wrapper"><div id="progressBar"></div></div>

        <div class="question-box">
            <span class="q-label" id="qLabel">Translate</span>
            <h2 class="main-word" id="targetWord">Word</h2>
            <div id="hintMsg" style="color:var(--hint); font-weight:bold; margin-top:10px; display:none;"></div>
        </div>

        <div id="optionsArea" class="options-grid"></div>
        
        <div id="spellArea" style="display:none;">
            <input type="text" id="spellInput" placeholder="Type here..." autocomplete="off">
            <div class="controls">
                <button class="btn btn-audio" onclick="speakWord()">🔊</button>
                <button class="btn btn-hint" onclick="showHint()">Hint</button>
                <button class="btn btn-check" onclick="checkSpelling()">Check</button>
            </div>
        </div>

        <button id="nextBtn" class="btn btn-check" style="display:none; width:100%; margin-top:20px;" onclick="nextRound()">Continue ➔</button>
    </div>

    <div id="reportScreen">
        <h2 class="hero-title">Session Complete! 🏆</h2>
        <p>מילים שכדאי לחזור עליהן:</p>
        <div id="missedList" style="text-align:right; margin: 20px 0;"></div>
        <button class="btn btn-check" style="width:100%" onclick="location.reload()">Back Home</button>
    </div>

    <div id="feedbackArea" class="feedback-area"></div>
</div>

<script>
    const vocabulary = [
        { en: "as well as", he: "וגם / בנוסף", cat: "home", emoji: "➕" },
        { en: "grow", he: "לגדול / לצמוח", cat: "animals", emoji: "🌱" },
        { en: "however", he: "למרות זאת", cat: "all", emoji: "🤔" },
        { en: "save", he: "לחסוך / להציל", cat: "animals", emoji: "🏥" },
        { en: "throw away", he: "לזרוק", cat: "home", emoji: "🗑️" },
        { en: "Earth", he: "כדור הארץ", cat: "animals", emoji: "🌍" },
        { en: "happen", he: "לקרות", cat: "all", emoji: "✨" },
        { en: "simple", he: "פשוט", cat: "all", emoji: "✅" },
        { en: "trash", he: "זבל", cat: "home", emoji: "📦" },
        { en: "refrigerator", he: "מקרר", cat: "home", emoji: "❄️" },
        { en: "especially", he: "במיוחד", cat: "adverbs", emoji: "🌟" },
        { en: "exactly", he: "בדיוק", cat: "adverbs", emoji: "🎯" },
        { en: "immediately", he: "מיד", cat: "adverbs", emoji: "⚡" },
        { en: "probably", he: "כנראה", cat: "adverbs", emoji: "❓" },
        { en: "suitcase", he: "מזוודה", cat: "home", emoji: "🧳" },
        { en: "vacation", he: "חופשה", cat: "home", emoji: "🏖️" },
        { en: "strange", he: "מוזר", cat: "all", emoji: "👽" },
        { en: "asleep", he: "ישן", cat: "animals", emoji: "😴" },
        { en: "steal", he: "לגנוב", cat: "animals", emoji: "🥷" }
    ];

    let gameState = {
        pool: [], currentIdx: 0, lives: 3, score: 0,
        missed: [], stats: JSON.parse(localStorage.getItem('eng_stats')) || {}
    };

    function startGame(cat) {
        gameState.pool = cat === 'all' ? [...vocabulary] : vocabulary.filter(v => v.cat === cat || cat === 'all');
        gameState.pool.sort(() => Math.random() - 0.5);
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        updateStreak();
        nextRound();
    }

    function updateStreak() {
        let last = localStorage.getItem('last_play');
        let streak = parseInt(localStorage.getItem('streak') || 0);
        let today = new Date().toDateString();
        if (last && last !== today) {
            let yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
            if (last === yesterday.toDateString()) streak++; else streak = 1;
        } else if (!last) streak = 1;
        localStorage.setItem('last_play', today);
        localStorage.setItem('streak', streak);
        document.getElementById('streakVal').innerText = streak;
    }

    function nextRound() {
        if (gameState.lives <= 0 || gameState.currentIdx >= gameState.pool.length) return endSession();
        
        const word = gameState.pool[gameState.currentIdx];
        const isSpell = Math.random() > 0.5;
        
        document.getElementById('targetWord').innerText = isSpell ? word.he : word.en;
        document.getElementById('qLabel').innerText = isSpell ? "How do you spell?" : "Choose translation " + word.emoji;
        document.getElementById('hintMsg').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('feedbackArea').innerText = '';

        if (isSpell) {
            document.getElementById('optionsArea').style.display = 'none';
            document.getElementById('spellArea').style.display = 'block';
            document.getElementById('spellInput').value = '';
            document.getElementById('spellInput').focus();
        } else {
            document.getElementById('optionsArea').style.display = 'grid';
            document.getElementById('spellArea').style.display = 'none';
            generateOptions(word);
        }
        updateUI();
    }

    function generateOptions(correct) {
        let opts = [correct.he];
        while(opts.length < 4) {
            let r = vocabulary[Math.floor(Math.random()*vocabulary.length)].he;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);
        const area = document.getElementById('optionsArea');
        area.innerHTML = '';
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = o;
            b.onclick = () => checkAnswer(o === correct.he);
            area.appendChild(b);
        });
    }

    function checkAnswer(isCorrect) {
        const word = gameState.pool[gameState.currentIdx];
        if (isCorrect) {
            confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });
            showFeedback("Correct! ✨", "var(--success)");
            speakWord();
            gameState.currentIdx++;
        } else {
            gameState.lives--;
            gameState.missed.push(word);
            document.querySelector('.app-container').classList.add('shake');
            setTimeout(() => document.querySelector('.app-container').classList.remove('shake'), 400);
            showFeedback("Oops! It's " + word.en, "var(--error)");
            gameState.currentIdx++;
        }
        document.getElementById('optionsArea').style.display = 'none';
        document.getElementById('spellArea').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'block';
    }

    function checkSpelling() {
        const word = gameState.pool[gameState.currentIdx];
        checkAnswer(document.getElementById('spellInput').value.trim().toLowerCase() === word.en.toLowerCase());
    }

    function showHint() {
        const word = gameState.pool[gameState.currentIdx];
        document.getElementById('hintMsg').innerText = "Starts with: " + word.en.substring(0,2) + "...";
        document.getElementById('hintMsg').style.display = 'block';
    }

    function showFeedback(txt, color) {
        const el = document.getElementById('feedbackArea');
        el.innerText = txt;
        el.style.color = color;
    }

    function speakWord() {
        window.speechSynthesis.cancel();

        const word = gameState.pool[gameState.currentIdx].en;
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US'; 
        utterance.rate = 0.7;  // race
        utterance.pitch = 1;   // Natural tune
        utterance.volume = 1;  // max valume

        window.speechSynthesis.speak(utterance);
    }

    function updateUI() {
        document.getElementById('lives').innerText = "❤️".repeat(gameState.lives);
        document.getElementById('progressBar').style.width = (gameState.currentIdx / gameState.pool.length) * 100 + "%";
    }

    function endSession() {
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('reportScreen').style.display = 'block';
        const list = document.getElementById('missedList');
        list.innerHTML = gameState.missed.length ? "" : "Perfect Score! 🌟";
        [...new Set(gameState.missed)].forEach(m => {
            list.innerHTML += `<div class="report-item"><span>${m.he}</span> <b>${m.en}</b></div>`;
        });
    }

    function resetAll() { if(confirm("Clear all learning history?")) { localStorage.clear(); location.reload(); } }

    document.getElementById('spellInput').addEventListener('keypress', e => { if(e.key === 'Enter') checkSpelling(); });
</script>
</body>
</html>
