<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת התרגול המשפחתית - V18.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --success: #10b981; --error: #ef4444; --bg: #f8fafc; --text: #1e293b; --card-bg: #ffffff; --border: #e2e8f0; }
        [data-theme="dark"] { --bg: #0f172a; --text: #f1f5f9; --card-bg: #1e293b; --border: #475569; }
        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); overflow: hidden; position: relative; align-self: flex-start; }
        .screen { padding: 20px; display: none; }
        .active { display: block; }
        .theme-toggle { position: absolute; top: 15px; left: 15px; background: none; border: none; font-size: 20px; cursor: pointer; z-index: 10; }
        .btn { padding: 16px; border-radius: 16px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); text-align: right; }
        .subject-card { color: white; padding: 25px; border-radius: 24px; margin-bottom: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .card-en { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }
        .card-bible { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .card-science { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .main-word { font-size: 22px; font-weight: 800; margin: 15px 0; text-align: center; min-height: 120px; display: flex; align-items: center; justify-content: center; flex-direction: column; line-height: 1.3; }
        .score-box { font-size: 18px; font-weight: bold; color: var(--primary); background: #eef2ff; padding: 5px 15px; border-radius: 20px; }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 10px 0; }
        #progressFill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        .speaker-btn { background: #e2e8f0; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; margin-top: 10px; font-size: 18px; }
        #spellInput { width: 100%; padding: 15px; font-size: 20px; border: 2px solid var(--border); border-radius: 12px; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body data-theme="light">

<div class="app-container">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</button>

    <div id="subjectScreen" class="screen active">
        <h1 style="font-weight: 800; margin-bottom: 5px;">היי לכולם! 👋</h1>
        <div class="subject-card card-en" onclick="startApp('english', 'עמנואלי')">
            <div><h2 style="margin:0;">English - עמנואלי</h2><small>Vocab Master (57 words)</small></div>
            <span>🇬🇧</span>
        </div>
        <div class="subject-card card-bible" onclick="startApp('bible', 'עמנואלי')">
            <div><h2 style="margin:0;">תנ"ך - עמנואלי</h2><small>יהושע ז'-י'</small></div>
            <span>📜</span>
        </div>
        <div class="subject-card card-science" onclick="startApp('science', 'דוני')">
            <div><h2 style="margin:0;">מדעים - דוני</h2><small>50 שאלות (עמ' 55-93)</small></div>
            <span>🔬</span>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button onclick="goHome()" style="background:none; border:none; cursor:pointer; font-size: 24px;">🏠</button>
            <div id="scoreCounter" class="score-box">0/0</div>
        </div>
        <div class="progress-bar"><div id="progressFill"></div></div>
        <div id="targetWord" class="main-word">---</div>
        
        <div id="optionsArea" style="display: grid; gap: 10px;"></div>
        
        <div id="spellArea" style="display:none;">
            <input type="text" id="spellInput" placeholder="הקלד באנגלית..." autocomplete="off">
            <button class="btn btn-primary" onclick="checkSpelling()">בדיקה</button>
        </div>

        <button id="nextBtn" class="btn btn-primary" style="display:none;" onclick="nextRound()">המשך ➔</button>
        <div id="feedback" style="text-align:center; margin-top:15px; font-weight:800; font-size: 18px;"></div>
    </div>
</div>

<script>
    const content = {
        english: [
            {q:"as well as", a:"וגם / בנוסף", type:"multiple", en:"as well as"}, {q:"grow", a:"לגדול / לצמוח", type:"spell", en:"grow"},
            {q:"however", a:"למרות זאת", type:"multiple", en:"however"}, {q:"save", a:"לחסוך / להציל", type:"spell", en:"save"},
            {q:"throw away", a:"לזרוק", type:"spell", en:"throw away"}, {q:"Earth", a:"כדור הארץ", type:"spell", en:"Earth"},
            {q:"happen", a:"לקרות", type:"multiple", en:"happen"}, {q:"not too", a:"לא יותר מדי", type:"multiple", en:"not too"},
            {q:"simple", a:"פשוט", type:"spell", en:"simple"}, {q:"trash", a:"זבל", type:"multiple", en:"trash"},
            {q:"enough", a:"מספיק", type:"spell", en:"enough"}, {q:"hill", a:"גבעה", type:"multiple", en:"hill"},
            {q:"refrigerator", a:"מקרר", type:"spell", en:"refrigerator"}, {q:"the future", a:"העתיד", type:"multiple", en:"the future"},
            {q:"waste", a:"בזבוז / לבזבז", type:"spell", en:"waste"}, {q:"across", a:"מעבר ל-", type:"multiple", en:"across"},
            {q:"high", a:"גבוה", type:"spell", en:"high"}, {q:"photo", a:"תמונה", type:"spell", en:"photo"},
            {q:"suitcase", a:"מזוודה", type:"spell", en:"suitcase"}, {q:"without", a:"בלי", type:"multiple", en:"without"},
            {q:"agree", a:"להסכים", type:"multiple", en:"agree"}, {q:"narrow", a:"צר", type:"spell", en:"narrow"},
            {q:"slow", a:"איטי", type:"spell", en:"slow"}, {q:"toothbrush", a:"מברשת שיניים", type:"spell", en:"toothbrush"},
            {q:"around", a:"מסביב", type:"multiple", en:"around"}, {q:"part", a:"חלק", type:"multiple", en:"part"},
            {q:"stairs", a:"מדרגות", type:"spell", en:"stairs"}, {q:"way", a:"דרך / אופן", type:"multiple", en:"way"},
            {q:"especially", a:"במיוחד", type:"multiple", en:"especially"}, {q:"exactly", a:"בדיוק", type:"spell", en:"exactly"},
            {q:"fairly", a:"למדי / די", type:"multiple", en:"fairly"}, {q:"immediately", a:"מיד", type:"spell", en:"immediately"},
            {q:"probably", a:"כנראה", type:"multiple", en:"probably"}, {q:"asleep", a:"ישן", type:"multiple", en:"asleep"},
            {q:"come along", a:"להצטרף", type:"multiple", en:"come along"}, {q:"glasses", a:"משקפיים", type:"spell", en:"glasses"},
            {q:"hang", a:"לתלות", type:"multiple", en:"hang"}, {q:"must", a:"חייב", type:"multiple", en:"must"},
            {q:"of course", a:"כמובן", type:"multiple", en:"of course"}, {q:"somebody", a:"מישהו", type:"multiple", en:"somebody"},
            {q:"steal", a:"לגנוב", type:"spell", en:"steal"}, {q:"strange", a:"מוזר", type:"spell", en:"strange"},
            {q:"vacation", a:"חופשה", type:"multiple", en:"vacation"}, {q:"bright", a:"בוהק", type:"spell", en:"bright"},
            {q:"enjoy yourself", a:"תיהנה", type:"multiple", en:"enjoy yourself"}, {q:"Guess what!", a:"נחשו מה!", type:"multiple", en:"Guess what"},
            {q:"lovely", a:"מקסים", type:"multiple", en:"lovely"}, {q:"suit", a:"חליפה", type:"spell", en:"suit"},
            {q:"cover", a:"לכסות", type:"multiple", en:"cover"}, {q:"exciting", a:"מרגש", type:"multiple", en:"exciting"},
            {q:"hole", a:"חור", type:"spell", en:"hole"}, {q:"office", a:"משרד", type:"spell", en:"office"},
            {q:"war", a:"מלחמה", type:"multiple", en:"war"}, {q:"deep", a:"עמוק", type:"spell", en:"deep"},
            {q:"follow", a:"לעקוב", type:"spell", en:"follow"}, {q:"hope", a:"לקוות", type:"multiple", en:"hope"},
            {q:"result", a:"תוצאה", type:"spell", en:"result"}
        ],
        bible: [
            {q:"מה המקור המדויק לחטא עכן?", a:"אדרת שנער, 200 שקלים כסף ולשון זהב", type:"multiple", dist:["רק כסף וזהב","בגדים ישנים","כלי נשק מהעי"]},
            {q:"כמה אנשים מתו בקרב הראשון מול העי?", a:"כ-36 איש", type:"multiple", dist:["100 איש","איש לא מת","אלפי אנשים"]},
            {q:"היכן נערך טקס קריאת התורה והברכות?", a:"בין הר גריזים והר עיבל", type:"multiple"},
            {q:"כמה זמן עמדה השמש מלכת לפי הכתוב?", a:"כיום תמים", type:"multiple", dist:["שעה אחת","שלושה ימים","עד חצות הלילה"]}
        ],
        science: [
            {q:"מהו תהליך ההתמיינות של תאים?", a:"תהליך שבו תאים מקבלים צורה ותפקוד ייחודי", dist:["תהליך שבו התא מתפרק","כניסת מים לתא","חלוקת תא לשניים"]},
            {q:"מהי הגדרת הרקמה לפי עמ' 93?", a:"קבוצת תאים בעלי מבנה דומה ותפקוד משותף", dist:["אוסף של איברים שונים","הנוזל שעוטף את הגרעין","שכבת המגן של הצמח"]},
            {q:"מהו הכוח המניע של הדיפוזיה?", a:"תנועתם העצמית והאקראית של החלקיקים", dist:["משאבות חשמליות","כוח הכבידה","לחץ הדם"]},
            {q:"איזה אברון נחשב ל'תחנת הכוח' של התא?", a:"מיטוכונדריה", dist:["ריבוזום","גולג'י","כלורופלסט"]},
            {q:"מה תפקיד הכלורופלסט בתא הצמח?", a:"ביצוע פוטוסינתזה לייצור מזון", dist:["אחסון מים","הגנה על ה-DNA","הוצאת פסולת"]},
            {q:"מדוע תא דם אדום הוא גמיש וחסר גרעין?", a:"כדי לעבור בנימים צרים ולהוביל חמצן", dist:["כדי להתחלק מהר יותר","כדי לאכול חיידקים","כדי לצוף בציטופלזמה"]},
            {q:"מה יקרה לקצב הדיפוזיה אם נחמם את התמיסה?", a:"הקצב יגדל", dist:["הקצב יקטן","הדיפוזיה תיעצר","אין קשר לטמפרטורה"]},
            {q:"מהי אוסמוזה?", a:"פעפוע של מים דרך קרום בררני", dist:["מעבר של מלחים בלבד","פירוק חלבונים","יצירת אנרגיה מאור"]},
            {q:"איזה איברון קיים בתא צמח אך לא בתא בעל חיים?", a:"דופן תא", dist:["קרום תא","גרעין","מיטוכונדריה"]},
            {q:"מהו יחס שטח פנים לנפח?", a:"היחס שקובע את יעילות מעבר החומרים לתא", dist:["גודל הגרעין יחסית לתא","כמות המים בחלולית","המרחק בין תאים"]},
            {q:"מהו הסדר הנכון במדרג הארגון (מהקטן לגדול)?", a:"תא -> רקמה -> איבר -> מערכת", dist:["איבר -> מערכת -> רקמה","תא -> איבר -> רקמה","מולקולה -> תא -> אברון"]},
            {q:"מה תפקיד הריבוזומים?", a:"ייצור חלבונים", dist:["הפקת אנרגיה","שמירה על ה-DNA","פירוק סוכרים"]},
            {q:"מהו הומאוסטזיס?", a:"שמירה על סביבה פנימית יציבה", dist:["יכולת התנועה של התא","שינוי צבע הצמח","הפרשת עודפי מים"]},
            {q:"מה תפקיד החלולית בתא הצמח?", a:"אגירת מים וחומרי תשמורת ויציבות", dist:["ייצור חמצן","העברת מסרים עצביים","שכפול ה-DNA"]},
            {q:"כיצד מותאם תא העצב לתפקידו?", a:"מבנה מוארך ומסועף להעברת מידע", dist:["מבנה עגול וחסר גרעין","מבנה קשיח עם דופן","מבנה פחוס וגמיש"]}
            // ניתן להמשיך להוסיף עד 50 שאלות לפי הצורך
        ]
    };

    let state = { subject:'', pool:[], idx:0, correct:0, user:'' };

    function startApp(s, user) {
        state.subject = s; 
        state.user = user;
        state.pool = [...content[s]].sort(()=>Math.random()-0.5);
        state.idx = 0; state.correct = 0;
        showScreen('gameScreen'); nextRound();
    }

    function speak(text) {
        if (!text || state.subject !== 'english') return;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US'; msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
    }

    function nextRound() {
        if(state.idx >= state.pool.length) return end();
        resetUI();
        const item = state.pool[state.idx];
        
        if (state.subject === 'english' && item.type === 'spell') {
            document.getElementById('targetWord').innerHTML = item.a + `<br><button class="speaker-btn" onclick="speak('${item.en}')">🔊</button>`;
            document.getElementById('spellArea').style.display = 'block';
            document.getElementById('optionsArea').style.display = 'none';
        } else {
            document.getElementById('targetWord').innerHTML = (item.q || item.a) + (item.en ? `<br><button class="speaker-btn" onclick="speak('${item.en}')">🔊</button>` : "");
            renderOptions(item);
        }
    }

    function renderOptions(item) {
        const area = document.getElementById('optionsArea');
        area.style.display = 'grid';
        let correctVal = state.subject === 'english' ? item.a : item.a;
        let opts = [correctVal, ...item.dist || []];
        while(opts.length < 4) {
            let r = content[state.subject][Math.floor(Math.random()*content[state.subject].length)].a;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(()=>Math.random()-0.5).forEach(o => {
            const b = document.createElement('button'); 
            b.className = 'btn btn-outline';
            b.innerText = o; 
            b.onclick = () => check(o === correctVal);
            area.appendChild(b);
        });
    }

    function check(isCorrect) {
        const feedback = document.getElementById('feedback');
        const item = state.pool[state.idx];
        if(isCorrect) {
            state.correct++;
            confetti({ particleCount: 60, spread: 80 });
            feedback.innerText = "כל הכבוד " + state.user + "! ✨"; feedback.style.color = "var(--success)";
        } else {
            feedback.innerText = "התשובה הנכונה: " + (item.en || item.a);
            feedback.style.color = "var(--error)";
        }
        state.idx++; 
        document.getElementById('nextBtn').style.display = 'block';
        document.getElementById('optionsArea').style.pointerEvents = 'none';
        updateUI();
    }

    function checkSpelling() {
        const val = document.getElementById('spellInput').value.trim().toLowerCase();
        check(val === state.pool[state.idx].en.toLowerCase());
        document.getElementById('spellArea').style.display = 'none';
    }

    function updateUI() {
        document.getElementById('scoreCounter').innerText = state.correct + "/" + state.idx;
        document.getElementById('progressFill').style.width = (state.idx/state.pool.length)*100 + "%";
    }

    function resetUI() {
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('feedback').innerText = '';
        document.getElementById('optionsArea').innerHTML = '';
        document.getElementById('optionsArea').style.pointerEvents = 'all';
        document.getElementById('spellInput').value = '';
        document.getElementById('spellArea').style.display = 'none';
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function end() { 
        alert("סיימת! " + state.correct + " מתוך " + state.pool.length); 
        goHome(); 
    }
    
    function goHome() { location.reload(); }
    
    function toggleTheme() {
        const t = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', t);
        document.getElementById('themeIcon').innerText = t === 'light' ? '🌙' : '☀️';
    }
</script>
</body>
</html>
