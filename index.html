<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הלמידה המשפחתית - V31.0</title>
    <script src="words.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --success: #10b981; --error: #ef4444; --bg: #f8fafc; --text: #1e293b; --card-bg: #ffffff; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); min-height: 700px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .screen { padding: 25px; display: none; flex: 1; flex-direction: column; }
        .active { display: flex; }
        .child-section { margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; }
        .child-name { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
        .btn { padding: 16px; border-radius: 18px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; }
        .btn-subject { background: #f1f5f9; color: var(--text); border: 1px solid #e2e8f0; justify-content: space-between; }
        .btn-primary { background: var(--primary); color: white; }
        .speed-controls { display: flex; gap: 8px; margin: 15px 0; justify-content: center; background: #eef2ff; padding: 10px; border-radius: 15px; }
        .speed-btn { padding: 8px 15px; border-radius: 10px; border: 2px solid transparent; cursor: pointer; background: white; font-weight: bold; }
        .speed-btn.active { border-color: var(--primary); color: var(--primary); }
        .main-word { font-size: 38px; font-weight: 800; text-align: center; margin: 25px 0; color: var(--primary); }
        .progress-bar { height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.5s; }
        .report-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .error-tag { background: #fee2e2; color: #b91c1c; padding: 4px 10px; border-radius: 8px; margin: 3px; display: inline-block; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="landingScreen" class="screen active">
        <h1 style="font-weight: 800;">הלימודים שלכם 🚀</h1>
        
        <div class="child-section">
    <div class="child-name">🎓 דוני - אנגלית עמוד 86</div>
    <button class="btn btn-subject" onclick="startApp('donny_nouns_86')">שמות עצם (Nouns) 🏙️</button>
    <button class="btn btn-subject" onclick="startApp('donny_grammar_86')">פעלים ותארים (Verbs & Adj) ⚙️</button>
    <button class="btn btn-subject" onclick="startApp('donny_expressions_86')">ביטויים ומילים נוספות 💬</button>
    <button class="btn btn-subject" onclick="startApp('donny_opinion_writing')">כתיבת דעה (Opinion) ✍️</button>
</div>

        <div class="child-section">
            <div class="child-name">📖 עמנואלי</div>
            <button class="btn btn-subject" onclick="startApp('english_emmanueli')">אנגלית 🇬🇧<span>➔</span></button>
            <button class="btn btn-subject" onclick="startApp('bible')">תנ"ך 📜<span>➔</span></button>
        </div>

        <button class="btn btn-primary" style="margin-top:auto" onclick="showReport()">📊 מעקב הורים</button>
    </div>

    <div id="gameScreen" class="screen">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div id="counter" style="text-align: center; font-weight: bold; font-size: 14px;"></div>

        <div id="speedContainer" class="speed-controls">
            <button class="speed-btn" onclick="setRate(0.6, this)">איטי</button>
            <button class="speed-btn active" onclick="setRate(1, this)">רגיל</button>
            <button class="speed-btn" onclick="setRate(1.4, this)">מהיר</button>
        </div>

        <div id="targetWord" class="main-word">---</div>
        <div id="optionsArea" style="display: grid; gap: 10px;"></div>
        
        <button class="btn" style="background:#eef2ff; color:var(--primary); margin-top:20px; border: 2px solid var(--primary);" onclick="speakCurrent()">
            🔊 השמע שוב (Repeat)
        </button>

        <div id="feedback" style="text-align:center; margin-top:15px; font-weight:800; font-size: 20px;"></div>
    </div>

    <div id="reportScreen" class="screen">
        <button class="btn btn-subject" onclick="goHome()">🏠 חזרה</button>
        <h2>מילים שדורשות חזרה:</h2>
        <div id="fullReportList"></div>
    </div>
</div>

<script>
    let state = { subject: '', pool: [], errors: [], idx: 0, rate: 1 };
    let stats = JSON.parse(localStorage.getItem('parent_stats_v31')) || {};

    function startApp(s) {
        state.subject = s;
        state.pool = [...content[s]].sort(() => Math.random() - 0.5);
        state.idx = 0; state.errors = [];
        showScreen('gameScreen');
        
        // הצג/הסתר בורר מהירות
        document.getElementById('speedContainer').style.visibility = s.includes('donny') || s.includes('english') ? 'visible' : 'hidden';
        
        nextRound();
    }

    function nextRound() {
        if (state.idx >= state.pool.length) {
            if (state.errors.length > 0) {
                state.pool = [...state.errors].sort(() => Math.random() - 0.5);
                state.errors = []; state.idx = 0;
                alert("כל הכבוד! עכשיו חוזרים על המילים שהיו קצת קשות...");
            } else {
                confetti({ particleCount: 150, spread: 70 });
                alert("סיימת את הכל! תותח!");
                return goHome();
            }
        }

        const item = state.pool[state.idx];
        resetUI();
        
        document.getElementById('targetWord').innerText = item.en || item.q;
        document.getElementById('counter').innerText = `שאלה ${state.idx + 1} מתוך ${state.pool.length}`;
        document.getElementById('progressFill').style.width = ((state.idx) / state.pool.length * 100) + "%";

        // הקראה אוטומטית (עובד!)
        if (item.en) {
            setTimeout(() => speakCurrent(), 500);
        }

        renderOptions(item);
    }

    function renderOptions(item) {
        const area = document.getElementById('optionsArea');
        const correct = item.he || item.a;
        let distractors = [];

        if (item.he) {
            distractors = content[state.subject].filter(w => w.he !== correct).sort(() => Math.random() - 0.5).slice(0, 3).map(w => w.he);
        } else {
            distractors = item.dist;
        }

        let opts = [correct, ...distractors].sort(() => Math.random() - 0.5);
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn btn-subject';
            b.innerText = o;
            b.onclick = () => handleChoice(o === correct, item);
            area.appendChild(b);
        });
    }

    function handleChoice(isCorrect, item) {
        const fb = document.getElementById('feedback');
        if (!stats[state.subject]) stats[state.subject] = { hits:0, tries:0, words:[] };
        stats[state.subject].tries++;

        if (isCorrect) {
            stats[state.subject].hits++;
            fb.innerHTML = "<span style='color:var(--success)'>נכון! ✨</span>";
        } else {
            fb.innerHTML = `<span style='color:var(--error)'>אופס.. המילה תחזור שוב</span>`;
            state.errors.push(item);
            let wordStr = item.en || item.q;
            if (!stats[state.subject].words.includes(wordStr)) stats[state.subject].words.push(wordStr);
        }

        localStorage.setItem('parent_stats_v31', JSON.stringify(stats));
        state.idx++;
        setTimeout(nextRound, 1200);
    }

    function speakCurrent() {
        const item = state.pool[state.idx];
        if (item && item.en) {
            const u = new SpeechSynthesisUtterance(item.en);
            u.lang = 'en-US'; u.rate = state.rate;
            window.speechSynthesis.speak(u);
        }
    }

    function setRate(r, btn) {
        state.rate = r;
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function showReport() {
        showScreen('reportScreen');
        const list = document.getElementById('fullReportList');
        list.innerHTML = '';
        for (let s in stats) {
            const div = document.createElement('div');
            div.className = 'report-card';
            div.innerHTML = `<strong>${s}:</strong> ${stats[s].hits}/${stats[s].tries}<br>` + 
                            stats[s].words.map(w => `<span class="error-tag">${w}</span>`).join('');
            list.appendChild(div);
        }
    }

    function resetUI() { document.getElementById('feedback').innerText = ''; document.getElementById('optionsArea').innerHTML = ''; }
    function goHome() { showScreen('landingScreen'); }
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
