<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Master - Hint Edition</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f0f2f5; --hint: #f39c12; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 500px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; position: relative; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #555; }
        .progress-container { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        .word-to-translate { font-size: 38px; margin: 15px 0; color: #2c3e50; font-weight: bold; }
        .question-type { font-size: 14px; color: #888; margin-bottom: 5px; font-weight: bold; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .option-btn { padding: 15px; font-size: 18px; border: 2px solid #eee; border-radius: 12px; cursor: pointer; background: white; transition: 0.2s; }
        .option-btn:hover { border-color: var(--primary); }
        
        #spellingArea { display: none; margin-top: 20px; }
        input { width: 100%; padding: 15px; font-size: 20px; border: 2px solid #ddd; border-radius: 12px; text-align: center; outline: none; box-sizing: border-box; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        button { padding: 12px 20px; font-size: 18px; cursor: pointer; border: none; border-radius: 12px; transition: 0.2s; font-weight: bold; }
        
        .btn-speak { background: #5d6d7e; color: white; width: 60px; font-size: 24px; }
        .btn-hint { background: var(--hint); color: white; flex: 1; }
        .btn-check { background: var(--success); color: white; flex: 2; }
        .btn-next { background: var(--primary); color: white; display: none; width: 100%; margin-top: 15px; }

        .feedback { margin-top: 20px; min-height: 35px; font-size: 22px; font-weight: bold; }
        .hint-text { color: var(--hint); font-size: 18px; margin-top: 10px; font-weight: normal; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

<div class="card">
    <div class="stats">
        <span>ניקוד: <span id="score">0</span></span>
        <span>מילה: <span id="count">1</span>/<span id="total">0</span></span>
    </div>
    <div class="progress-container"><div id="progress"></div></div>
    
    <div id="gameArea">
        <div class="question-type" id="qType">תרגום</div>
        <div class="word-to-translate" id="mainWord">---</div>

        <div id="multipleChoice" class="options-grid"></div>

        <div id="spellingArea">
            <input type="text" id="englishInput" placeholder="הקלד באנגלית..." autocomplete="off">
        </div>

        <div class="action-btns" id="actionContainer">
            <button class="btn-speak" onclick="speakCurrent()" title="השמע מילה">🔊</button>
            <button class="btn-hint" id="hintBtn" onclick="giveHint()">רמז 💡</button>
            <button class="btn-check" id="checkBtn" onclick="handleSpellingCheck()" style="display:none;">בדוק!</button>
        </div>
    </div>

    <button class="btn-next" id="nextBtn" onclick="setupRound()">המשיכו למילה הבאה ➔</button>
    <div id="feedback" class="feedback"></div>
    <div id="hintDisplay" class="hint-text"></div>
</div>

<script>
    const vocabulary = [
        { en: "as well as", he: "וגם / בנוסף" }, { en: "grow", he: "לגדול / לצמוח" },
        { en: "however", he: "למרות זאת" }, { en: "save", he: "לחסוך / להציל" },
        { en: "throw away", he: "לזרוק" }, { en: "Earth", he: "כדור הארץ" },
        { en: "happen", he: "לקרות" }, { en: "simple", he: "פשוט" },
        { en: "trash", he: "זבל" }, { en: "especially", he: "במיוחד" },
        { en: "exactly", he: "בדיוק" }, { en: "immediately", he: "מיד" },
        { en: "suitcase", he: "מזוודה" }, { en: "without", he: "בלי" },
        { en: "strange", he: "מוזר" }, { en: "vacation", he: "חופשה" },
        { en: "refrigerator", he: "מקרר" }, { en: "future", he: "עתיד" },
        { en: "probably", he: "כנראה" }, { en: "enough", he: "מספיק" }
    ];

    let currentWord;
    let score = 0;
    let solvedCount = 0;
    let hintsUsedInRound = 0;

    document.getElementById('total').innerText = vocabulary.length;

    function setupRound() {
        if (solvedCount >= vocabulary.length) {
            document.querySelector('.card').innerHTML = `<h1>🏆 אלוף האנגלית!</h1><p>סיימת עם ${score} נקודות.</p><button onclick="location.reload()" style="background:var(--primary); color:white; padding:15px; border-radius:10px; cursor:pointer; border:none;">להתחיל מחדש</button>`;
            return;
        }

        currentWord = vocabulary[solvedCount];
        hintsUsedInRound = 0;
        const isMultipleChoice = Math.random() > 0.5;

        document.getElementById('feedback').innerText = '';
        document.getElementById('hintDisplay').innerText = '';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('actionContainer').style.display = 'flex';
        
        if (isMultipleChoice) {
            showMultipleChoice();
        } else {
            showSpelling();
        }
        updateUI();
    }

    function showMultipleChoice() {
        document.getElementById('qType').innerText = "איך מתרגמים את המילה:";
        document.getElementById('mainWord').innerText = currentWord.en;
        document.getElementById('multipleChoice').style.display = 'grid';
        document.getElementById('spellingArea').style.display = 'none';
        document.getElementById('checkBtn').style.display = 'none';

        let options = [currentWord.he];
        while (options.length < 4) {
            let randomWord = vocabulary[Math.floor(Math.random() * vocabulary.length)].he;
            if (!options.includes(randomWord)) options.push(randomWord);
        }
        options.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('multipleChoice');
        grid.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleChoice(opt);
            grid.appendChild(btn);
        });
    }

    function showSpelling() {
        document.getElementById('qType').innerText = "כתוב באנגלית:";
        document.getElementById('mainWord').innerText = currentWord.he;
        document.getElementById('multipleChoice').style.display = 'none';
        document.getElementById('spellingArea').style.display = 'block';
        document.getElementById('checkBtn').style.display = 'block';
        document.getElementById('englishInput').value = '';
        document.getElementById('englishInput').focus();
    }

    function speakCurrent() {
        const msg = new SpeechSynthesisUtterance(currentWord.en);
        msg.lang = 'en-US';
        msg.rate = 0.9; // מעט יותר איטי להבנה טובה
        window.speechSynthesis.speak(msg);
    }

    function giveHint() {
        hintsUsedInRound++;
        speakCurrent(); // רמז קולי תמיד
        
        if (document.getElementById('spellingArea').style.display === 'block') {
            // רמז ויזואלי לאיות - מציג את 2 האותיות הראשונות
            const hint = currentWord.en.substring(0, 2) + "...";
            document.getElementById('hintDisplay').innerText = "מתחיל ב: " + hint;
        } else {
            document.getElementById('hintDisplay').innerText = "הקשב להגייה...";
        }
        score -= 2; // "קנס" קטן על רמז כדי לעודד לנסות לבד
        updateUI();
    }

    function handleChoice(selected) {
        if (selected === currentWord.he) success();
        else fail(`התשובה הנכונה: ${currentWord.he}`);
    }

    function handleSpellingCheck() {
        const input = document.getElementById('englishInput').value.trim().toLowerCase();
        if (input === currentWord.en.toLowerCase()) success();
        else fail(`התשובה הנכונה: ${currentWord.en}`);
    }

    function success() {
        score += 10;
        solvedCount++;
        document.getElementById('feedback').innerText = "נכון מאוד! ✨";
        document.getElementById('feedback').style.color = "var(--success)";
        speakCurrent();
        endRound();
    }

    function fail(msg) {
        document.getElementById('feedback').innerText = msg;
        document.getElementById('feedback').style.color = "var(--error)";
        document.querySelector('.card').classList.add('shake');
        setTimeout(() => document.querySelector('.card').classList.remove('shake'), 400);
        solvedCount++;
        endRound();
    }

    function endRound() {
        document.getElementById('multipleChoice').style.display = 'none';
        document.getElementById('spellingArea').style.display = 'none';
        document.getElementById('actionContainer').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'block';
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('count').innerText = Math.min(solvedCount + 1, vocabulary.length);
        document.getElementById('progress').style.width = (solvedCount / vocabulary.length) * 100 + "%";
    }

    document.getElementById('englishInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSpellingCheck();
    });

    setupRound();
</script>

</body>
</html>
