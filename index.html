<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת התרגול של עמנואלי ודוני</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --success: #10b981; --error: #ef4444; --bg: #f8fafc; --text: #1e293b; --card-bg: #ffffff; --border: #e2e8f0; }
        [data-theme="dark"] { --bg: #0f172a; --text: #f1f5f9; --card-bg: #1e293b; --border: #475569; }
        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); overflow: hidden; position: relative; align-self: flex-start; }
        .screen { padding: 20px; display: none; }
        .active { display: block; }
        .theme-toggle { position: absolute; top: 15px; left: 15px; background: none; border: none; font-size: 20px; cursor: pointer; z-index: 10; }
        .btn { padding: 16px; border-radius: 16px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); text-align: right; }
        .btn-hint { background: #fef3c7; color: #d97706; border: 1px solid #fcd34d; font-size: 14px; padding: 8px; margin-bottom: 15px; width: auto; display: inline-block; border-radius: 10px; }
        .subject-card { color: white; padding: 25px; border-radius: 24px; margin-bottom: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .card-en { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }
        .card-bible { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .card-science { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .main-word { font-size: 22px; font-weight: 800; margin: 15px 0; text-align: center; min-height: 100px; display: flex; align-items: center; justify-content: center; flex-direction: column; line-height: 1.3; }
        .score-box { font-size: 18px; font-weight: bold; color: var(--primary); background: #eef2ff; padding: 5px 15px; border-radius: 20px; }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 10px 0; }
        #progressFill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        .speaker-btn { background: #e2e8f0; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; margin-top: 10px; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body data-theme="light">

<div class="app-container">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</button>

    <div id="subjectScreen" class="screen active">
        <h1 style="font-weight: 800;">תרגול למשפחה 🏠</h1>
        <div class="subject-card card-en" onclick="startApp('english', 'עמנואלי')">
            <div><h2 style="margin:0;">English - עמנואלי</h2><small>אוצר מילים מורחב</small></div>
            <span>🇬🇧</span>
        </div>
        <div class="subject-card card-bible" onclick="startApp('bible', 'עמנואלי')">
            <div><h2 style="margin:0;">תנ"ך - עמנואלי</h2><small>יהושע ז'-י' (מאגר מלא)</small></div>
            <span>📜</span>
        </div>
        <div class="subject-card card-science" onclick="startApp('science', 'דוני')">
            <div><h2 style="margin:0;">מדעים - דוני</h2><small>התא ומאפייני חיים</small></div>
            <span>🔬</span>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button onclick="goHome()" style="background:none; border:none; cursor:pointer; font-size: 24px;">🏠</button>
            <div id="scoreCounter" class="score-box">0/0</div>
        </div>
        <div class="progress-bar"><div id="progressFill"></div></div>
        <div id="targetWord" class="main-word">---</div>
        <div id="optionsArea" style="display: grid; gap: 10px;"></div>
        <button id="nextBtn" class="btn btn-primary" style="display:none;" onclick="nextRound()">המשך ➔</button>
        <div id="feedback" style="text-align:center; margin-top:15px; font-weight:800; font-size: 18px;"></div>
    </div>
</div>

<script>
    const content = {
        bible: [
            {q: "מי היה האדם שמעל בחרם ביריחו?", a: "עכן בן כרמי", dist: ["זבדי בן זרח", "יהושע בן נון", "פנחס בן אלעזר"]},
            {q: "מאיזה שבט הגיע עכן?", a: "שבט יהודה", dist: ["שבט אפרים", "שבט בנימין", "שבט לוי"]},
            {q: "מה היו החפצים המדויקים שעכן לקח?", a: "אדרת שנער, 200 שקלים כסף ולשון זהב אחת", dist: ["כתר זהב וחרב", "בגדי משי וזהב", "כדי כסף ופסלים"]},
            {q: "מה קרה בקרב הראשון מול העי?", a: "ישראל נגפו ונסו, ונהרגו כ-36 איש", dist: ["ישראל ניצחו בקלות", "היה תיקו", "העי נכנעה ללא קרב"]},
            {q: "מה עשה יהושע לאחר הכישלון בקרב הראשון בעי?", a: "קרע שמלותיו ונפל על פניו לפני ארון ה'", dist: ["שלח מרגלים נוספים", "הכריז על מלחמה כוללת", "ברח למצרים"]},
            {q: "איך נתפס עכן כחוטא?", a: "על ידי הפלת גורלות לפי שבטים, משפחות ובתי אב", dist: ["לפי עדות ראייה", "הוא הודה מעצמו מיד", "המלאך גבריאל גילה ליהושע"]},
            {q: "איפה נקבר עכן ומה הוקם מעליו?", a: "בעמק עכור, והוקם עליו גל אבנים גדול", dist: ["ביריחו תחת חומה", "במערת המכפלה", "במדבר בתוך בור"]},
            {q: "כמה אנשים שלח יהושע למארב בקרב השני מול העי?", a: "30,000 גיבורי חיל (לפי פסוק ג')", dist: ["300 איש", "5,000 איש", "כל העם"]},
            {q: "מה היה התכסיס (הסטרטגיה) בקרב השני בעי?", a: "משיכת אנשי העי מחוץ לעיר בזמן שהמארב נכנס ושורף אותה", dist: ["הקפת העיר 7 פעמים", "חפירת מנהרה מתחת לחומה", "הפצצת העיר באבני בליסטראות"]},
            {q: "מה עשה יהושע עם הכידון בקרב העי?", a: "נטה אותו לעבר העיר עד שהוחרמה כולה", dist: ["זרק אותו על מלך העי", "שבר אותו לאות שלום", "הניף אותו לכיוון השמיים"]},
            {q: "מה עשו הגבעונים כדי להערים על יהושע?", a: "לבשו בגדים בלויים, לקחו לחם יבש ונאדות יין סדוקים", dist: ["התחפשו לחיילים מצרים", "שלחו מתנות זהב רבות", "הסתתרו בתוך פסלים"]},
            {q: "מדוע יהושע לא הרג את הגבעונים לאחר שגילה את התרמית?", a: "כי הנשיאים נשבעו להם בה' אלוהי ישראל", dist: ["כי הוא ריחם עליהם", "כי ה' ציווה להשאירם", "כי הם היו חזקים מדי"]},
            {q: "מה היה התפקיד שניתן לגבעונים לדורות?", a: "חוטבי עצים ושואבי מים לעדה ולמזבח", dist: ["שומרי חומות", "כהנים במקדש", "חיילים בצבא יהושע"]},
            {q: "מי היה המלך שהנהיג את חמשת מלכי האמורי נגד גבעון?", a: "אדוני צדק מלך ירושלים", dist: ["הורם מלך חברון", "יפיע מלך לכיש", "דביר מלך עגלון"]},
            {q: "מה ביקש יהושע מה' בקרב בעמק איילון?", a: "שמש בגבעון דום וירח בעמק איילון", dist: ["שיוריד אש מהשמיים", "שיפתח את האדמה", "שיעצור את הגשם"]},
            {q: "מה הרג יותר אנשים מחמשת המלכים מאשר החרב?", a: "אבני ברד גדולות שהשליך ה' מהשמיים", dist: ["מגפה", "רעב", "הנהר שעלה על גדותיו"]},
            {q: "לאן נסו חמשת המלכים ואיפה הסתתרו?", a: "נסו למקדה והסתתרו במערה", dist: ["נסו לירושלים", "נסו ליריחו", "נסו למצרים"]},
            {q: "מה עשו קציני יהושע לחמשת המלכים לפני מותם?", a: "שימו את רגליהם על צווארי המלכים", dist: ["נתנו להם לאכול", "שחררו אותם", "קשרו אותם לעצים"]},
            {q: "היכן נבנה המזבח של יהושע בפרק ח'?", a: "בהר עיבל", dist: ["בהר גריזים", "בירושלים", "בבית אל"]},
            {q: "מה נכתב על האבנים במזבח שבנה יהושע?", a: "משנה תורת משה", dist: ["עשרת הדיברות", "שמות השבטים", "סיפור הניצחון על העי"]}
        ],
        english: [
             {q:"as well as", a:"וגם / בנוסף", type:"multiple", en:"as well as"},
             {q:"grow", a:"לגדול / לצמוח", type:"multiple", en:"grow"},
             {q:"however", a:"למרות זאת", type:"multiple", en:"however"},
             {q:"save", a:"לחסוך / להציל", type:"multiple", en:"save"},
             {q:"Earth", a:"כדור הארץ", type:"multiple", en:"Earth"},
             {q:"happen", a:"לקרות", type:"multiple", en:"happen"},
             {q:"simple", a:"פשוט", type:"multiple", en:"simple"},
             {q:"trash", a:"זבל", type:"multiple", en:"trash"},
             {q:"enough", a:"מספיק", type:"multiple", en:"enough"},
             {q:"hill", a:"גבעה", type:"multiple", en:"hill"},
             {q:"the future", a:"העתיד", type:"multiple", en:"the future"},
             {q:"waste", a:"בזבוז / לבזבז", type:"multiple", en:"waste"},
             {q:"across", a:"מעבר ל-", type:"multiple", en:"across"},
             {q:"high", a:"גבוה", type:"multiple", en:"high"},
             {q:"suitcase", a:"מזוודה", type:"multiple", en:"suitcase"},
             {q:"without", a:"בלי", type:"multiple", en:"without"},
             {q:"especially", a:"במיוחד", type:"multiple", en:"especially"},
             {q:"immediately", a:"מיד", type:"multiple", en:"immediately"},
             {q:"probably", a:"כנראה", type:"multiple", en:"probably"}
        ],
        science: [
            {q:"מהו האברון שאחראי על הפקת האנרגיה?", a:"מיטוכונדריה", dist:["גרעין", "קרום", "דופן"]},
            {q:"מהו מאפיין החיים המאפשר שמירה על סביבה יציבה?", a:"הומיאוסטזיס", dist:["נשימה", "רבייה", "גדילה"]},
            {q:"מה תפקיד הכלורופלסט?", a:"ביצוע פוטוסינתזה", dist:["אחסון מים", "הגנה", "ייצור חלבון"]},
            {q:"מה ההבדל בין תא צמח לתא בעל חיים?", a:"בתא צמח יש דופן תא וכלורופלסט", dist:["בתא בעל חיים יש דופן", "רק בתא צמח יש גרעין", "אין הבדל"]}
        ]
    };

    let state = { subject:'', pool:[], idx:0, correct:0, user:'' };

    function startApp(s, user) {
        state.subject = s; 
        state.user = user;
        state.pool = [...content[s]].sort(()=>Math.random()-0.5);
        state.idx = 0; state.correct = 0;
        showScreen('gameScreen'); nextRound();
    }

    function nextRound() {
        if(state.idx >= state.pool.length) return end();
        resetUI();
        const item = state.pool[state.idx];
        document.getElementById('targetWord').innerText = item.q;
        renderOptions(item);
        updateUI();
    }

    function renderOptions(item) {
        const area = document.getElementById('optionsArea');
        let opts = [item.a, ...item.dist || []];
        while(opts.length < 4) {
            let r = content[state.subject][Math.floor(Math.random()*content[state.subject].length)].a;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(()=>Math.random()-0.5).forEach(o => {
            const b = document.createElement('button'); 
            b.className = 'btn btn-outline';
            b.innerText = o; 
            b.onclick = () => check(o === item.a);
            area.appendChild(b);
        });
    }

    function check(isCorrect) {
        const feedback = document.getElementById('feedback');
        if(isCorrect) {
            state.correct++;
            confetti({ particleCount: 60, spread: 80, origin: { y: 0.6 } });
            feedback.innerText = "מעולה " + state.user + "! ✨"; feedback.style.color = "var(--success)";
        } else {
            feedback.innerText = "טעות. התשובה הנכונה: " + state.pool[state.idx].a;
            feedback.style.color = "var(--error)";
        }
        state.idx++; 
        document.getElementById('nextBtn').style.display = 'block';
        document.getElementById('optionsArea').style.pointerEvents = 'none';
        updateUI();
    }

    function updateUI() {
        document.getElementById('scoreCounter').innerText = state.correct + "/" + state.idx;
        document.getElementById('progressFill').style.width = (state.idx/state.pool.length)*100 + "%";
    }

    function resetUI() {
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('feedback').innerText = '';
        document.getElementById('optionsArea').innerHTML = '';
        document.getElementById('optionsArea').style.pointerEvents = 'all';
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goHome() { location.reload(); }
    
    function end() { 
        alert("סיימת! התוצאה: " + state.correct + " מתוך " + state.pool.length); 
        goHome(); 
    }

    function toggleTheme() {
        const t = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', t);
        document.getElementById('themeIcon').innerText = t === 'light' ? '🌙' : '☀️';
    }
</script>
</body>
</html>
